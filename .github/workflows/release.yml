name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'src/avcardtool/__init__.py'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Tag the commit, build .deb, and attach to GitHub Release
  # ---------------------------------------------------------------------------
  build-deb:
    name: Build .deb (arm64)
    runs-on: ubuntu-latest
    permissions:
      contents: write  # needed to create tags and releases

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # needed so git tag push works correctly

      - name: Read version
        id: version
        run: |
          VERSION=$(python3 -c "import re; print(re.search(r'__version__ = \"([\d.]+)\"', open('src/avcardtool/__init__.py').read()).group(1))")
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=v$VERSION" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          if git rev-parse "${{ steps.version.outputs.tag }}" >/dev/null 2>&1; then
            echo "Tag ${{ steps.version.outputs.tag }} already exists — skipping."
          else
            git tag "${{ steps.version.outputs.tag }}"
            git push origin "${{ steps.version.outputs.tag }}"
          fi

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry and dpkg tools
        run: |
          pip install poetry
          sudo apt-get install -y dpkg-dev

      - name: Build wheel
        run: poetry build

      - name: Build .deb package
        run: bash package_deb.sh

      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: ${{ steps.version.outputs.tag }}
          files: dist/*.deb
          generate_release_notes: true
