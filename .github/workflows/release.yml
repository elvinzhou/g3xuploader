name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  # ---------------------------------------------------------------------------
  # Build .deb for Raspberry Pi (arm64) and attach to GitHub Release
  # The package bundles the wheel; no C compilation required.
  # ---------------------------------------------------------------------------
  build-deb:
    name: Build .deb (arm64)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Poetry and dpkg tools
        run: |
          pip install poetry
          sudo apt-get install -y dpkg-dev

      - name: Build wheel
        run: poetry build

      - name: Build .deb package
        run: bash package_deb.sh

      - name: Upload .deb to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*.deb
          generate_release_notes: true
